<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="https://r2.fivemanage.com/KI47PRPlZ6mWbDJxEnfwk/Watermark3.png" type="image/png">
    
    <!-- Discord/Open Graph Meta Tags -->
    <meta property="og:title" content="The Hoods LA | Updates">
    <meta property="og:description" content="Stay updated with the latest changes and community news.">
    <meta property="og:image" content="https://r2.fivemanage.com/KI47PRPlZ6mWbDJxEnfwk/Watermark3.png">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#007eff">
</head>

<body>
    <header class="navbar">
        <div class="nav-container">
            <div class="logo-box">
                <a href="index.html">
                    <img src="https://r2.fivemanage.com/KI47PRPlZ6mWbDJxEnfwk/Watermark3.png" alt="Logo">
                </a>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">Home</a>
                <a href="rules.html" class="nav-item">Rules</a>
                <a href="about.html" class="nav-item">About</a>
                <a href="staff.html" class="nav-item">Staff</a>
                <a href="links.html" class="nav-item">Links</a>
                <a href="updates.html" class="nav-item active">Updates</a>
            </nav>
            <div class="nav-actions">
                <a href="https://discord.gg/thehoodsla" class="btn-primary" target="_blank" rel="noopener noreferrer">Join Discord</a>
            </div>
        </div>
    </header>

    <main>
        <section class="sub-hero">
            <div class="container">
                <h1 class="reveal-text">THE <span class="dim">FEED</span></h1>
                <p class="sub-reveal">Stay updated with the latest changes and community news.</p>
            </div>
        </section>

        <section class="content-block">
            <div class="container">
                <div id="announcements-container" class="update-list">
                    <!-- Announcements will be loaded here dynamically -->
                    <div class="loading-state">Loading latest updates...</div>
                </div>
            </div>
        </section>

        <footer class="site-footer">
            <div class="container">
                <p>&copy; 2024 THE HOODS LA. All rights reserved.</p>
            </div>
        </footer>
    </main>

    <script src="data/announcements.js"></script>
    <script>
        function getIcon(badge) {
            const b = badge.toLowerCase();
            const icons = {
                update: '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.71-2.13.09-2.91a2.18 2.18 0 0 0-3.09-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg>',
                event: '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>',
                alert: '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>',
                fix: '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>',
                announce: '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>',
                megaphone: '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>'
            };
            return icons[b] || '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';
        }

        function loadAnnouncements() {
            const container = document.getElementById('announcements-container');
            
            if (!announcements || announcements.length === 0) {
                container.innerHTML = '<p class="no-updates">No updates available at this time.</p>';
                return;
            }

            const displayList = [...announcements].reverse();

            container.innerHTML = displayList.map(item => `
                <div class="update-item">
                    <div class="update-icon-box">
                        ${getIcon(item.badge)}
                    </div>
                    <div class="update-content">
                        <div class="update-meta">
                            <span class="tag">${item.badge}</span>
                            <span class="update-date">${item.date}</span>
                        </div>
                        <h3>${item.title}</h3>
                        <p>${item.content}</p>
                    </div>
                </div>
            `).join('');
        }
        
        document.addEventListener('DOMContentLoaded', loadAnnouncements);
    </script>
</body>

</html>
