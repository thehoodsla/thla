<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | The Hoods LA</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { padding-top: 50px; }
        .admin-container { max-width: 800px; margin: 0 auto; background: var(--card-bg); padding: 3rem; border-radius: 20px; border: 1px solid var(--border); }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-weight: 600; }
        input, textarea { width: 100%; padding: 1rem; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; color: white; font-family: inherit; }
        .admin-list { margin-top: 3rem; border-top: 1px solid var(--border); padding-top: 2rem; }
        .admin-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem; border-bottom: 1px solid var(--border); }
        .btn-delete { background: #ff4444; color: white; border: none; padding: 0.5rem 1rem; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1 style="margin-bottom: 2rem;">Admin <span class="dim">Dashboard</span></h1>
        
        <div class="form-group">
            <label>Admin Password</label>
            <input type="password" id="password" placeholder="Enter password to make changes">
        </div>

        <hr style="margin: 2rem 0; border: 0; border-top: 1px solid var(--border);">

        <h3>Add New Announcement</h3>
        <div class="form-group">
            <label>Badge (e.g. Update, Event, Alert)</label>
            <input type="text" id="badge" placeholder="Update">
        </div>
        <div class="form-group">
            <label>Title</label>
            <input type="text" id="title" placeholder="Announcement Title">
        </div>
        <div class="form-group">
            <label>Content</label>
            <textarea id="content" rows="4" placeholder="Announcement details..."></textarea>
        </div>
        <button onclick="addAnnouncement()" class="btn-main" style="width: 100%;">Post Announcement</button>

        <div class="admin-list" id="adminList">
            <!-- List of current announcements -->
        </div>
    </div>

    <script>
        async function loadAnnouncements() {
            const res = await fetch('/api/announcements');
            const data = await res.json();
            const list = document.getElementById('adminList');
            list.innerHTML = '<h3>Current Announcements</h3>';
            data.reverse().forEach(item => {
                list.innerHTML += `
                    <div class="admin-item">
                        <div>
                            <strong>[${item.badge}] ${item.title}</strong>
                            <div style="font-size: 0.8rem; color: var(--text-muted);">${item.date}</div>
                        </div>
                        <button class="btn-delete" onclick="deleteAnnouncement(${item.id})">Delete</button>
                    </div>
                `;
            });
        }

        async function addAnnouncement() {
            const password = document.getElementById('password').value;
            const badge = document.getElementById('badge').value;
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;

            const res = await fetch('/api/announcements', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password, badge, title, content })
            });

            if (res.ok) {
                alert('Success!');
                location.reload();
            } else {
                alert('Unauthorized or Error');
            }
        }

        async function deleteAnnouncement(id) {
            const password = document.getElementById('password').value;
            if (!confirm('Are you sure?')) return;

            const res = await fetch('/api/announcements/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password, id })
            });

            if (res.ok) {
                location.reload();
            } else {
                alert('Unauthorized or Error');
            }
        }

        loadAnnouncements();
    </script>
</body>
</html>
